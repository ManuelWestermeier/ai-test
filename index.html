<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groq Direct Access</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
        background: #1a1a1b;
        color: #eee;
      }
      #chat-box {
        height: 450px;
        border: 1px solid #333;
        overflow-y: auto;
        padding: 15px;
        background: #272729;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
      }
      .msg {
        margin-bottom: 12px;
        padding: 10px 15px;
        border-radius: 8px;
        line-height: 1.4;
        max-width: 85%;
      }
      .user {
        background: #0061ff;
        align-self: flex-end;
        color: white;
      }
      .ai {
        background: #3e3e40;
        align-self: flex-start;
        border: 1px solid #444;
      }
      .input-area {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      input[type="text"] {
        padding: 12px;
        border-radius: 5px;
        border: 1px solid #444;
        background: #272729;
        color: white;
      }
      .btn-row {
        display: flex;
        gap: 10px;
      }
      button {
        flex: 1;
        padding: 12px;
        background: #00a67e;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
      }
      button:disabled {
        background: #444;
        cursor: not-allowed;
      }
      #imageInput {
        color: #aaa;
      }
      .status {
        font-size: 0.8em;
        color: #888;
        text-align: center;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <h2>Groq Direct Interface</h2>
    <div id="chat-box"></div>

    <div class="input-area">
      <input
        type="text"
        id="prompt"
        placeholder="Schreibe eine Nachricht..."
        autocomplete="off"
      />
      <div class="btn-row">
        <input
          type="file"
          id="imageInput"
          accept="image/jpeg, image/png, image/webp"
        />
        <button id="sendBtn">Anfrage senden</button>
      </div>
      <div id="status" class="status">Modus: Text (Llama 3.3)</div>
    </div>

    <script>
      const chatBox = document.getElementById("chat-box");
      const promptInput = document.getElementById("prompt");
      const imageInput = document.getElementById("imageInput");
      const sendBtn = document.getElementById("sendBtn");
      const statusText = document.getElementById("status");

      let history = [];

      // Hilfsfunktion: Bild zu Base64 (ohne Prefix)
      const toBase64 = (file) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.onerror = (error) => reject(error);
        });

      async function callGroq() {
        const apiKey = localStorage.getItem("vkAI_groq_key");
        const prompt = promptInput.value.trim();
        const file = imageInput.files[0];

        if (!apiKey) {
          alert("Fehler: Kein 'vkAI_groq_key' im LocalStorage gefunden!");
          return;
        }

        if (!prompt && !file) return;

        // UI Sperren & Vorbereiten
        sendBtn.disabled = true;
        appendMessage("user", prompt || "[Bild hochgeladen]");

        let model = "openai/gpt-oss-safeguard-20b"; // Standard Text-Modell
        let messages = [
          { role: "system", content: "Du bist ein hilfreicher Assistent." },
        ];

        try {
          if (file) {
            // Vision-Modell nutzen
            model = "meta-llama/llama-4-scout-17b-16e-instruct";
            const base64Image = await toBase64(file);
            messages.push({
              role: "user",
              content: [
                { type: "text", text: prompt || "Beschreibe dieses Bild." },
                {
                  type: "image_url",
                  image_url: { url: `data:${file.type};base64,${base64Image}` },
                },
              ],
            });
          } else {
            // Normaler Chat mit Historie
            history.forEach((h) => messages.push(h));
            messages.push({ role: "user", content: prompt });
          }

          const response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${apiKey}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                model: model,
                messages: messages,
                temperature: 0.7,
                max_tokens: 1024,
              }),
            },
          );

          const data = await response.json();

          if (data.choices && data.choices[0]) {
            const reply = data.choices[0].message.content;
            appendMessage("ai", reply);

            // Historie nur bei Text-Chats führen
            if (!file) {
              history.push({ role: "user", content: prompt });
              history.push({ role: "assistant", content: reply });
            }
          } else {
            throw new Error(data.error?.message || "Fehler von Groq erhalten");
          }
        } catch (err) {
          appendMessage("ai", "Fehler: " + err.message);
        } finally {
          sendBtn.disabled = false;
          promptInput.value = "";
          imageInput.value = "";
        }
      }

      function appendMessage(role, text) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      sendBtn.onclick = callGroq;
      promptInput.onkeypress = (e) => {
        if (e.key === "Enter") callGroq();
      };
    </script>
  </body>
</html>
